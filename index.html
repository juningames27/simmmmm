<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca NTE | Gestão</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    <header>
        <div class="logo">Biblioteca NTE</div>
        <nav>
            <button onclick="navigate('view-dashboard')" class="nav-btn active">Início</button>
            <button onclick="navigate('view-books')" class="nav-btn">Livros</button>
            <button onclick="navigate('view-loans')" class="nav-btn">Empréstimos</button>
            <button id="theme-toggle" onclick="toggleTheme()">⚫</button>
        </nav>
    </header>

    <main>
        <section id="view-dashboard" class="view active">
            <div class="dashboard-cards">
                <div class="card"><h3>Acervo</h3><p id="dash-total-books">0</p></div>
                <div class="card"><h3>Alugados</h3><p id="dash-rented-books">0</p></div>
            </div>
            <div class="charts-container">
                <canvas id="chartStatus"></canvas>
                <canvas id="chartMonthly"></canvas>
            </div>
        </section>

        <section id="view-books" class="view">
            <h2>Gestão de Acervo</h2>
            <form id="form-book" class="form-container">
                <input type="text" id="book-title" placeholder="Título" required>
                <input type="text" id="book-author" placeholder="Autor" required>
                <button type="submit">Cadastrar</button>
            </form>
            <input type="text" id="search-book-input" placeholder="🔍 Pesquisar livro..." class="search-bar">
            <table>
                <thead><tr><th>ID</th><th>Título</th><th>Autor</th><th>Status</th><th>Ação</th></tr></thead>
                <tbody id="table-books-body"></tbody>
            </table>
        </section>

        <section id="view-loans" class="view">
            <h2>Registrar Saída</h2>
            <form id="form-loan" class="form-container">
                <input type="text" id="loan-student" placeholder="Nome Aluno" required>
                <input type="tel" id="loan-phone" placeholder="Telefone" required>
                <select id="loan-school" required>
                    <option value="E.M Cléber Sampaio">E.M Cléber Sampaio</option>
                    <option value="E.M Moacyr Bacelar">E.M Moacyr Bacelar</option>
                </select>
                <input list="books-datalist" id="loan-book-search" placeholder="Buscar livro por Título ou ID" required>
                <datalist id="books-datalist"></datalist>
                <input type="date" id="loan-date" required>
                <button type="submit">Confirmar</button>
            </form>
            <table>
                <thead><tr><th>Aluno</th><th>Livro</th><th>Entrega</th><th>Ação</th></tr></thead>
                <tbody id="table-loans-body"></tbody>
            </table>
        </section>
    </main>

    <div id="modal-edit-book" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modal-edit-book')">&times;</span>
            <h3>Editar Livro</h3>
            <input type="text" id="edit-book-title">
            <input type="text" id="edit-book-author">
            <button onclick="saveBookEdit()" class="btn-success">Salvar</button>
        </div>
    </div>

    <div id="modal-loan" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modal-loan')">&times;</span>
            <h3>Detalhes do Empréstimo</h3>
            <input type="text" id="edit-loan-student" placeholder="Nome">
            <input type="text" id="edit-loan-phone" placeholder="Telefone">
            <input type="text" id="edit-loan-school" placeholder="Escola">
            <button onclick="saveLoanEdit()" class="btn-success">Atualizar Dados</button>
            <button id="btn-confirm-return" class="btn-primary-outline">Confirmar Entrega (Devolver)</button>
            <button id="btn-delete-loan" class="btn-danger-outline">Apagar Registro</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
